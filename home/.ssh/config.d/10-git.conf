# ============================================================================
# Git / Git Hosting 用設定
# ============================================================================

# GitHub（複数アカウント）
Host github-jqit github-vlb github-div-system github-div-lberc github-personal github.com
  HostName github.com
  User git
  IdentitiesOnly yes
  UseKeychain yes
  AddKeysToAgent yes
  ControlMaster no
  ControlPath none

Host github-jqit
  IdentityFile ~/.ssh/JQIT

Host github-vlb
  IdentityFile ~/.ssh/VLB_ONO

Host github-div-system
  IdentityFile ~/.ssh/DIV_DEV_SYSTEM

Host github-div-lberc
  IdentityFile ~/.ssh/DIV_DEV_LBERC

Host github-personal
  IdentityFile ~/.ssh/YUKI_ONO

# デフォルト github.com
Host github.com
  IdentityFile ~/.ssh/JQIT

# Backlog
Host backlog-*
  IdentitiesOnly yes
  UseKeychain yes
  AddKeysToAgent yes
  ControlMaster no
  ControlPath none

Host backlog-lg-mobile
  HostName lg-mobile.git.backlog.com
  User lg-mobile
  IdentityFile ~/.ssh/VLB_ONO

Host backlog-jqit
  HostName jqit.git.backlog.com
  User jqit
  IdentityFile ~/.ssh/JQIT
