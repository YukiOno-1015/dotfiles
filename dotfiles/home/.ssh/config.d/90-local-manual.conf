# ============================================================================
# 手動管理設定（自動生成対象外）
# ============================================================================

Host *
  ServerAliveInterval 60
  ServerAliveCountMax 3
  TCPKeepAlive yes
  ControlMaster auto
  ControlPath ~/.ssh/cp-%C
  ControlPersist 10m
  HashKnownHosts yes
  HostKeyAlgorithms ssh-ed25519,ssh-rsa
  UseKeychain no
  AddKeysToAgent no
  IdentitiesOnly yes

# ローカル管理端末
Host machost
  HostName 192.168.100.254
  User yukiono
  IdentityFile ~/.ssh/YUKI_ONO
  IdentitiesOnly yes
  ProxyJump tunnel

Host macmini
  HostName 192.168.100.15
  User yukiono
  IdentityFile ~/.ssh/YUKI_ONO
  IdentitiesOnly yes
  ProxyJump tunnel

# 追加で手動管理したいHostはこのファイル末尾に追記
